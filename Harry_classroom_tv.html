<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e0f2fe">
  <title>Harry英文教室 App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; position: fixed; overflow: hidden; background-color: #e0f2fe; }
    body { display: flex; flex-direction: column; align-items: center; -webkit-tap-highlight-color: transparent; touch-action: pan-y; font-family: sans-serif; transition: background-color 0.7s; }
    .no-select { user-select: none; -webkit-user-select: none; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; transform: translate3d(0, 0, 0); }
    .rotate-y-180 { transform: rotateY(180deg); }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
  </style>
</head>
<body>

  <!-- 頂部控制區 -->
  <div id="top-bar" class="w-full max-w-3xl hidden items-center justify-between px-4 pt-6 pb-4 z-20 shrink-0">
    <h1 class="text-xl sm:text-2xl font-bold flex items-center gap-2 text-slate-700">
      <i data-lucide="book-open" class="text-blue-600"></i>
      Harry英文教室
      <button onclick="toggleInfo(true)" class="ml-1 p-1.5 text-slate-400 hover:text-blue-500 bg-white/80 rounded-full shadow-sm">
        <i data-lucide="info" class="w-5 h-5"></i>
      </button>
    </h1>
    <button onclick="fetchCSVData()" class="flex items-center justify-center p-2.5 bg-white/80 rounded-xl shadow-sm text-blue-600 active:scale-95 transition-transform group">
      <i data-lucide="refresh-cw" class="w-5 h-5 group-active:rotate-180 transition-transform duration-300"></i>
    </button>
  </div>

  <!-- 主內容容器 -->
  <div class="flex-1 w-full flex flex-col items-center justify-center px-4 pb-6 overflow-hidden relative max-w-3xl">
    
    <!-- 首頁 -->
    <div id="view-home" class="hidden flex-col items-center justify-center text-center w-full h-full animate-fade-in z-10">
      <div class="mb-6 p-6 bg-white/80 backdrop-blur-sm rounded-full shadow-xl">
         <i data-lucide="book-open" class="text-blue-600 w-20 h-20 sm:w-24 sm:h-24"></i>
      </div>
      <h1 class="text-4xl sm:text-6xl font-extrabold text-slate-800 tracking-tight mb-3">Harry英文教室</h1>
      <p class="text-lg sm:text-xl text-slate-600 mb-10">每天 20 個單字，提升英文實力</p>
      <button onclick="startLearning()" class="flex items-center gap-2 px-10 py-4 bg-blue-600 text-white rounded-full font-bold text-xl hover:bg-blue-700 active:scale-95 shadow-lg transition-all">
        <i data-lucide="play" class="w-6 h-6 fill-current"></i> 開始學習
      </button>
    </div>

    <!-- 載入中 -->
    <div id="view-loading" class="hidden flex-col items-center justify-center text-slate-500 w-full h-full transition-opacity">
      <i id="loading-icon" data-lucide="loader-2" class="w-14 h-14 mb-4 text-blue-500 animate-spin"></i>
      <p id="loading-text" class="text-lg font-bold">載入單字庫...</p>
    </div>

    <!-- 結算畫面 -->
    <div id="view-finished" class="hidden w-full bg-white/90 backdrop-blur-md rounded-3xl shadow-xl p-8 sm:p-12 flex-col items-center text-center animate-fade-in z-10">
      <div class="bg-green-100 p-4 rounded-full mb-4 shadow-inner">
        <i data-lucide="check-circle" class="text-green-500 w-14 h-14"></i>
      </div>
      <h2 class="text-2xl sm:text-3xl font-extrabold text-slate-800 mb-2">完成練習！</h2>
      <p class="text-slate-600 mb-8">恭喜您，已複習完本輪 20 個單字。</p>
      <button onclick="fetchCSVData()" class="flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-2xl font-bold text-lg active:scale-95 shadow-md transition-transform">
        <i data-lucide="shuffle" class="w-5 h-5"></i> 重新抽取
      </button>
    </div>

    <!-- 學習卡片區 -->
    <div id="view-active" class="hidden w-full h-full flex-col items-center z-10 animate-fade-in">
      <!-- 進度條 -->
      <div class="w-full mb-4 flex items-center bg-white/90 px-4 py-3 rounded-2xl shadow-sm gap-3 shrink-0">
        <div class="text-sm font-bold text-slate-600 min-w-[40px]">
          <span id="progress-current" class="text-blue-600">0</span>/<span id="progress-total">0</span>
        </div>
        <div class="flex-1 h-2.5 bg-slate-200/60 rounded-full overflow-hidden relative">
          <div id="progress-bar" class="absolute top-0 left-0 h-full bg-blue-500 transition-all duration-500 rounded-full"></div>
        </div>
      </div>

      <!-- 卡片容器 -->
      <div id="flashcard-container" class="w-full flex-1 relative perspective-1000 no-select" onclick="handleCardClick()">
        <div id="flashcard-inner" class="absolute inset-0 w-full h-full transition-transform duration-500 transform-style-3d">
          
          <!-- 正面 -->
          <div id="card-front" class="absolute inset-0 backface-hidden bg-white rounded-3xl shadow-lg flex flex-col items-center justify-center p-6 border border-slate-100">
            <h2 id="front-word" class="text-4xl sm:text-6xl font-extrabold text-slate-800 break-words text-center mb-6"></h2>
            <button onclick="event.stopPropagation(); speakCurrentWord()" class="p-4 text-blue-500 bg-blue-50 rounded-full active:scale-90 transition-transform shadow-sm">
              <i data-lucide="volume-2" class="w-10 h-10"></i>
            </button>
            <div class="absolute bottom-6 text-slate-400 flex items-center gap-1.5 text-sm bg-slate-50 px-4 py-2 rounded-full">
              <i data-lucide="mouse-pointer-click" class="w-4 h-4"></i> 點擊翻面
            </div>
          </div>

          <!-- 背面 -->
          <div id="card-back" class="absolute inset-0 backface-hidden rotate-y-180 bg-white rounded-3xl shadow-lg flex flex-col border border-slate-100 overflow-hidden">
            <div class="flex-1 flex flex-col p-4 sm:p-6 pb-0 overflow-hidden">
              <div class="w-full shrink-0 rounded-2xl mb-3 bg-blue-50/50 border border-blue-100 flex items-center justify-center py-4 px-3 gap-2">
                <h2 id="back-word" class="text-3xl sm:text-5xl font-extrabold text-slate-800 text-center break-words"></h2>
                <button onclick="event.stopPropagation(); speakCurrentWord()" oncontextmenu="event.preventDefault(); event.stopPropagation(); speakCurrentWordSlowly(); return false;" class="p-2 text-blue-500 bg-white/80 rounded-full active:scale-90 shadow-sm shrink-0">
                  <i data-lucide="volume-2" class="w-6 h-6"></i>
                </button>
              </div>
              <div id="back-details" class="flex-1 overflow-y-auto pr-2 custom-scrollbar text-sm sm:text-base text-left pb-4"></div>
            </div>
            
            <div class="bg-slate-50 border-t border-slate-100 p-3 sm:p-4 shrink-0">
              <div class="flex justify-between gap-2 max-w-md mx-auto">
                <button onclick="handleRating('review', event)" class="flex-1 py-3 bg-white border border-red-200 text-red-600 rounded-xl font-bold active:scale-95 shadow-sm text-sm sm:text-base">Review</button>
                <button onclick="handleRating('hold', event)" class="flex-1 py-3 bg-white border border-green-200 text-green-600 rounded-xl font-bold active:scale-95 shadow-sm text-sm sm:text-base">Hold</button>
                <button onclick="handleRating('remove', event)" class="flex-1 py-3 bg-white border border-blue-200 text-blue-600 rounded-xl font-bold active:scale-95 shadow-sm text-sm sm:text-base">Remove</button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Info 彈窗 -->
  <div id="info-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center z-[100] p-4" onclick="toggleInfo(false)">
    <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-fade-in" onclick="event.stopPropagation()">
      <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="info" class="text-blue-500"></i> 功能說明</h3>
      <div class="space-y-3 text-sm text-slate-600">
        <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
          <p class="font-bold text-slate-800 mb-1">觸控與滑鼠</p>
          <ul class="list-disc pl-4 space-y-1">
            <li>點擊卡片：翻轉卡片</li>
            <li>喇叭圖示 (左鍵)：正常朗讀</li>
            <li>喇叭圖示 (右鍵)：慢速朗讀</li>
          </ul>
        </div>
        <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
          <p class="font-bold text-slate-800 mb-1">電腦鍵盤</p>
          <ul class="list-disc pl-4 space-y-1">
            <li><kbd class="font-mono font-bold bg-white px-1 border rounded">Space</kbd>：翻面 / 慢速朗讀</li>
            <li><kbd class="font-mono font-bold bg-white px-1 border rounded">←</kbd>：Review (稍後重複)</li>
            <li><kbd class="font-mono font-bold bg-white px-1 border rounded">↓</kbd>：Hold (移至末端)</li>
            <li><kbd class="font-mono font-bold bg-white px-1 border rounded">→</kbd>：Remove (完成)</li>
          </ul>
        </div>
      </div>
      <button onclick="toggleInfo(false)" class="mt-5 w-full py-3 bg-blue-600 text-white rounded-xl font-bold active:scale-95">關閉</button>
    </div>
  </div>

  <script>
    const CSV_URL = 'https://raw.githubusercontent.com/kotoko1012-hk/English-Vocabulary/refs/heads/main/flashcards.csv';
    const state = { cards: [], queue: [], isFlipped: false, hasStarted: false, lastWord: '', lastFlipped: null };
    const $ = id => document.getElementById(id);
    let currentAudio = null;

    document.addEventListener("DOMContentLoaded", () => {
        lucide.createIcons();
        fetchCSVData();
        window.addEventListener('keydown', handleKeyDown);
    });

    function setView(activeId) {
        ['view-home', 'view-loading', 'view-finished', 'view-active'].forEach(id => {
            $(id).style.display = id === activeId ? 'flex' : 'none';
        });
        $('top-bar').style.display = (activeId === 'view-home' || activeId === 'view-loading') ? 'none' : 'flex';
        document.body.style.backgroundColor = (activeId === 'view-home' || activeId === 'view-finished') ? '#e0f2fe' : '#f5e8d3';
    }

    function updateUI() {
        if (!state.hasStarted) return state.cards.length && setView('view-home');
        if (!state.queue.length && state.cards.length) return setView('view-finished');
        
        if (state.queue.length) {
            setView('view-active');
            const total = state.cards.length, curr = state.queue.length, curCard = state.queue[0];
            $('progress-current').innerText = curr;
            $('progress-total').innerText = total;
            $('progress-bar').style.width = `${((total - curr) / total) * 100}%`;
            $('front-word').innerText = $('back-word').innerText = curCard.word;
            $('back-details').innerHTML = generateBackDetailsHTML(curCard.details);
            
            $('flashcard-inner').style.transform = state.isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
            $('card-front').style.pointerEvents = state.isFlipped ? 'none' : 'auto';
            $('card-back').style.pointerEvents = state.isFlipped ? 'auto' : 'none';
            
            lucide.createIcons();
            checkAutoSpeak();
        }
    }

    function generateBackDetailsHTML(details) {
        let inEx = false;
        return details.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
            if (line.includes('【例句】')) inEx = true;
            else if (line.startsWith('【')) inEx = false;
            const isEx = inEx && !line.startsWith('【'), isHeader = line.startsWith('【');
            const css = isHeader ? 'font-bold text-indigo-700 mt-3 text-[15px] border-b border-slate-100 pb-0.5 mb-1 block' : 'text-slate-700 text-[15px] leading-snug block';
            const btn = isEx ? `<button onclick="event.stopPropagation(); speak('${line.split(/[(（]/)[0].trim().replace(/'/g, "\\'")}')" class="ml-2 p-1.5 text-blue-500 bg-blue-50 rounded-full active:scale-90 shrink-0"><i data-lucide="volume-2" class="w-4 h-4"></i></button>` : '';
            return `<div class="${isHeader ? '' : 'mb-1.5'} flex items-start w-full"><span class="flex-1 whitespace-pre-wrap ${css}">${line}</span>${btn}</div>`;
        }).join('');
    }

    // 關鍵修復：改用 HTML5 Audio (Google TTS) 確保媒體聲音能投射到電視
    function speak(text, rate = 1.0) {
        if (!text) return;
        
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }

        try {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en-US&q=${encodeURIComponent(text)}`;
            currentAudio = new Audio(url);
            currentAudio.playbackRate = rate;
            currentAudio.play().catch(e => {
                console.warn("Audio API failed, using fallback", e);
                fallbackSpeak(text, rate);
            });
        } catch(err) {
            fallbackSpeak(text, rate);
        }
    }

    // 系統 TTS (備用方案)
    function fallbackSpeak(text, rate) {
        if (!window.speechSynthesis) return;
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = rate;
        speechSynthesis.speak(u);
    }

    const speakCurrentWord = (rate = 1.0) => state.queue.length && speak(state.queue[0].word, rate);
    const speakCurrentWordSlowly = () => speakCurrentWord(0.5);
    const checkAutoSpeak = () => {
        if (!state.queue.length) return;
        const targetText = state.isFlipped ? state.queue[0].firstExampleEn : state.queue[0].word;
        if (state.lastWord !== state.queue[0].word || state.lastFlipped !== state.isFlipped) {
            speak(targetText, 1.0);
            state.lastWord = state.queue[0].word;
            state.lastFlipped = state.isFlipped;
        }
    };

    async function fetchCSVData() {
        try {
            setView('view-loading');
            const res = await fetch(CSV_URL, { cache: "no-store" });
            if (!res.ok) throw new Error();
            const parsed = parseCSV(await res.text());
            if (parsed.length > 0) {
                state.cards = parsed.sort(() => 0.5 - Math.random()).slice(0, 20);
                state.queue = [...state.cards];
                state.isFlipped = state.hasStarted = false;
                state.lastWord = ''; state.lastFlipped = null;
                setTimeout(updateUI, 200);
            } else throw new Error();
        } catch (e) {
            $('loading-text').innerText = "載入失敗，請檢查網路。";
            $('loading-icon').className = "w-14 h-14 mb-4 text-red-500";
            $('loading-icon').setAttribute('data-lucide', 'alert-circle');
            lucide.createIcons();
        }
    }

    function parseCSV(text) {
        const rows = [];
        let row = [], cell = '', inQ = false;
        for (let i = 0; i < text.length; i++) {
            const c = text[i];
            if (c === '"') { if (inQ && text[i + 1] === '"') { cell += '"'; i++; } else inQ = !inQ; } 
            else if (c === ',' && !inQ) { row.push(cell); cell = ''; } 
            else if (c === '\n' && !inQ) { row.push(cell); rows.push(row); row = []; cell = ''; } 
            else if (c !== '\r' || inQ) cell += c;
        }
        if (cell || row.length) { row.push(cell); rows.push(row); }
        return rows.filter(r => r.length >= 2).map(r => {
            const word = r[0].trim(), details = r[1] || "";
            const lines = details.split('\n').map(l => l.trim()).filter(Boolean);
            const exIdx = lines.findIndex(l => l.includes('【例句】'));
            const firstExampleEn = (exIdx !== -1 && lines[exIdx + 1] && !lines[exIdx + 1].startsWith('【')) ? lines[exIdx + 1].split(/[(（]/)[0].trim() : "";
            return { word, details, firstExampleEn };
        });
    }

    function handleRating(r, e) {
        if (e) e.stopPropagation();
        const cur = state.queue.shift();
        if (r === 'review') state.queue.splice(state.queue.length ? 1 : 0, 0, cur);
        else if (r === 'hold') state.queue.push(cur);
        state.isFlipped = false; updateUI();
    }

    function handleCardClick() { if (!state.isFlipped && state.queue.length) { state.isFlipped = true; updateUI(); } }
    function startLearning() { state.hasStarted = true; updateUI(); }
    function toggleInfo(s) { $('info-modal').style.display = s ? 'flex' : 'none'; }
    function handleKeyDown(e) {
        if ($('info-modal').style.display === 'flex') return e.key === 'Escape' && toggleInfo(false);
        if (!state.cards.length) return; 
        if (!state.hasStarted) return e.code === 'Space' && (e.preventDefault(), startLearning());
        if (!state.queue.length) return;
        
        if (e.code === 'Space') {
            e.preventDefault(); 
            if (!state.isFlipped) { state.isFlipped = true; updateUI(); }
            else speakCurrentWordSlowly();
        } else if (state.isFlipped) {
            const map = { 'ArrowLeft': 'review', 'ArrowDown': 'hold', 'ArrowRight': 'remove' };
            if (map[e.key]) handleRating(map[e.key]);
        }
    }
  </script>
</body>
</html>
