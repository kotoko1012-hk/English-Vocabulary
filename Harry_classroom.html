<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e0f2fe">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Harry英文教室">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%232563eb' rx='20'/%3E%3Ctext y='65' x='18' font-size='60'%3E📖%3C/text%3E%3C/svg%3E">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📖%3C/text%3E%3C/svg%3E">
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Harry%E8%8B%B1%E6%96%87%E6%95%99%E5%AE%A4%22%2C%22short_name%22%3A%22Harry%E8%8B%B1%E6%96%87%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23e0f2fe%22%2C%22theme_color%22%3A%22%232563eb%22%7D">

  <title>Harry英文教室 App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: pan-y;
    }
    .no-select { user-select: none; -webkit-user-select: none; }
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; -webkit-transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; transform: translate3d(0, 0, 0); -webkit-transform: translate3d(0, 0, 0); }
    .rotate-y-180 { transform: rotateY(180deg); }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
  </style>
</head>
<body class="h-screen h-[100dvh] w-full flex flex-col items-center pt-8 pb-6 sm:py-10 px-4 font-sans text-slate-800 overflow-hidden transition-colors duration-700 bg-sky-100">

  <!-- 頂部控制區 -->
  <div id="top-bar" class="w-full max-w-3xl hidden items-center justify-between mb-4 sm:mb-6 z-20">
    <h1 class="text-xl sm:text-2xl font-bold flex items-center gap-2 text-slate-700">
      <i data-lucide="book-open" class="text-blue-600"></i>
      Harry英文教室
      <button onclick="toggleInfo(true)" class="ml-1 sm:ml-2 p-1.5 text-slate-400 hover:text-blue-500 bg-white hover:bg-blue-50 border border-transparent hover:border-blue-100 rounded-full transition-all shadow-sm" title="功能與操作說明">
        <i data-lucide="info" class="w-[18px] h-[18px] sm:w-[20px] sm:h-[20px]"></i>
      </button>
    </h1>
    <button onclick="fetchCSVData()" class="flex items-center justify-center p-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl shadow-sm hover:bg-slate-50 transition-all active:scale-95 group" title="重新抽取20個單字">
      <i data-lucide="refresh-cw" class="text-blue-600 w-[18px] h-[18px] sm:w-[20px] sm:h-[20px] group-active:rotate-180 transition-transform duration-300"></i>
    </button>
  </div>

  <!-- 視圖 0: 首頁 -->
  <div id="view-home" class="hidden flex-1 flex-col items-center justify-center text-center w-full max-w-3xl animate-fade-in z-10 min-h-0">
    <div class="mb-6 sm:mb-8 p-6 bg-white/80 backdrop-blur-sm rounded-full shadow-2xl border border-slate-100/50 flex items-center justify-center">
       <i data-lucide="book-open" class="text-blue-600 w-20 h-20 sm:w-24 sm:h-24"></i>
    </div>
    <h1 class="text-4xl sm:text-7xl font-extrabold text-slate-800 tracking-tight mb-4 drop-shadow-sm">Harry英文教室</h1>
    <p class="text-lg sm:text-xl text-slate-600 mb-10 sm:mb-12 font-medium">每天 20 個單字，提升英文實力</p>
    <button onclick="startLearning()" class="group flex items-center gap-3 px-10 py-4 sm:px-12 sm:py-5 bg-blue-600 text-white rounded-full font-bold text-xl sm:text-2xl hover:bg-blue-700 transition-all shadow-xl hover:shadow-2xl active:scale-95">
      <i data-lucide="play" class="w-6 h-6 sm:w-7 sm:h-7 fill-current"></i> 開始學習
    </button>
  </div>

  <!-- 視圖 1: 載入中/錯誤狀態 -->
  <div id="view-loading" class="flex-1 flex flex-col items-center justify-center text-slate-500 w-full max-w-3xl transition-opacity duration-300">
    <i id="loading-icon" data-lucide="loader-2" class="w-12 h-12 sm:w-16 sm:h-16 mb-6 text-blue-500 animate-spin"></i>
    <p id="loading-text" class="text-lg sm:text-xl font-bold tracking-wide">載入單字庫中...</p>
  </div>

  <!-- 視圖 2: 結算畫面 -->
  <div id="view-finished" class="hidden w-full max-w-2xl bg-white/90 backdrop-blur-md rounded-3xl shadow-xl p-8 sm:p-16 flex-col items-center text-center border border-white/50 animate-fade-in z-10">
    <div class="bg-green-100 p-4 rounded-full mb-6 shadow-inner">
      <i data-lucide="check-circle" class="text-green-500 w-12 h-12 sm:w-16 sm:h-16"></i>
    </div>
    <h2 class="text-2xl sm:text-4xl font-extrabold text-slate-800 mb-4">完成練習！</h2>
    <p class="text-base sm:text-lg text-slate-600 mb-8 sm:mb-10">恭喜您，已經複習完本輪抽取的 20 個單字卡。</p>
    <button onclick="fetchCSVData()" class="mx-auto flex items-center gap-3 px-6 py-3.5 sm:px-8 sm:py-4 bg-blue-600 text-white rounded-2xl font-bold text-lg sm:text-xl hover:bg-blue-700 transition-all shadow-lg hover:shadow-xl active:scale-95">
      <i data-lucide="shuffle" class="w-5 h-5 sm:w-6 sm:h-6"></i> 重新抽取
    </button>
  </div>

  <!-- 視圖 3: 學習卡片主體 -->
  <div id="view-active" class="hidden w-full flex-col items-center z-10 animate-fade-in flex-1 min-h-0 pb-12 sm:pb-0">
    <div class="w-full max-w-3xl mb-4 sm:mb-6 flex items-center bg-white/90 backdrop-blur-sm px-4 sm:px-5 py-3 sm:py-4 rounded-2xl shadow-sm border border-slate-200/50 gap-4 sm:gap-6 shrink-0">
      <div class="text-sm font-bold text-slate-600 whitespace-nowrap min-w-[50px]">
        <span id="progress-current" class="text-blue-600 text-base">0</span> / <span id="progress-total">0</span>
      </div>
      <div class="flex-1 h-2.5 sm:h-3 bg-slate-200/60 rounded-full overflow-hidden shadow-inner relative">
        <div id="progress-bar" class="absolute top-0 left-0 h-full bg-blue-500 transition-all duration-500 ease-out rounded-full" style="width: 0%"></div>
      </div>
    </div>

    <div id="flashcard-container" class="no-select perspective-1000 w-full max-w-3xl flex-1 min-h-0 cursor-pointer mb-6 sm:mb-4" onclick="handleCardClick()">
      <div id="flashcard-inner" class="relative w-full h-full transition-transform duration-500 ease-out transform-style-3d">
        <!-- 正面 -->
        <div id="card-front" class="absolute inset-0 backface-hidden bg-white rounded-3xl shadow-xl flex flex-col items-center justify-between p-6 sm:p-8 border border-slate-100 z-10">
          <div class="flex-1 w-full"></div>
          <div class="flex flex-col items-center justify-center gap-6 w-full shrink-0">
            <h2 id="front-word" class="text-5xl sm:text-7xl lg:text-8xl font-extrabold text-slate-800 break-words text-center tracking-tight w-full px-4"></h2>
            <button onclick="event.stopPropagation(); speakWord()" class="p-4 sm:p-5 text-blue-500 hover:bg-blue-100 bg-blue-50 rounded-full transition-all active:scale-95 hover:scale-105 shrink-0 shadow-sm" title="正常朗讀">
              <i data-lucide="volume-2" class="w-10 h-10 sm:w-12 sm:h-12 stroke-[2.5px]"></i>
            </button>
          </div>
          <div class="flex-1 w-full flex items-end justify-center pb-2">
            <div class="text-slate-400 flex items-center gap-2 font-medium bg-slate-50 px-4 py-2 sm:px-5 sm:py-2.5 rounded-full shrink-0 shadow-sm border border-slate-100">
              <i data-lucide="hand" class="w-4 h-4 sm:w-5 sm:h-5"></i>
              <span class="text-sm sm:text-base">輕觸卡片顯示解答</span>
            </div>
          </div>
        </div>

        <!-- 背面 -->
        <div id="card-back" class="absolute inset-0 backface-hidden rotate-y-180 bg-white rounded-3xl shadow-xl flex flex-col border border-slate-100 z-0">
          <div class="flex-1 flex flex-col p-4 sm:p-8 pb-3 overflow-hidden rounded-t-3xl w-full min-h-0">
            <div class="w-full shrink-0 rounded-2xl mb-4 bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100 flex items-center justify-center shadow-sm py-4 sm:py-6 px-4 gap-3">
              <h2 id="back-word" class="text-3xl sm:text-5xl font-extrabold text-slate-800 tracking-tight text-center break-words"></h2>
              <button onclick="event.stopPropagation(); speakWord(0.5)" class="p-2 sm:p-3 text-blue-500 hover:bg-blue-100 bg-white/60 rounded-full transition-all active:scale-95 shrink-0 shadow-sm" title="慢速朗讀">
                <i data-lucide="volume-1" class="w-6 h-6 sm:w-8 sm:h-8 stroke-[2.5px]"></i>
              </button>
            </div>
            <div id="back-details" class="flex-1 overflow-y-auto pr-2 sm:pr-3 custom-scrollbar text-left w-full touch-pan-y overscroll-contain"></div>
          </div>
          <div class="w-full bg-slate-50 border-t border-slate-100 p-3 sm:p-5 shrink-0 rounded-b-3xl">
            <div class="grid grid-cols-3 gap-2 sm:gap-6 max-w-xl mx-auto">
              <button onclick="handleRating('review', event)" class="flex flex-col items-center justify-center py-2 sm:py-4 px-1 rounded-xl sm:rounded-2xl bg-white border border-red-100 hover:bg-red-50 active:bg-red-100 active:scale-95 transition-all shadow-sm group">
                <i data-lucide="rotate-ccw" class="w-5 h-5 text-red-500 mb-1 block sm:hidden"></i>
                <span class="text-sm sm:text-lg font-bold text-red-600 group-hover:scale-105 transition-transform">Review</span>
              </button>
              <button onclick="handleRating('hold', event)" class="flex flex-col items-center justify-center py-2 sm:py-4 px-1 rounded-xl sm:rounded-2xl bg-white border border-green-100 hover:bg-green-50 active:bg-green-100 active:scale-95 transition-all shadow-sm group">
                <i data-lucide="arrow-downToLine" class="w-5 h-5 text-green-500 mb-1 block sm:hidden"></i>
                <span class="text-sm sm:text-lg font-bold text-green-600 group-hover:scale-105 transition-transform">Hold</span>
              </button>
              <button onclick="handleRating('remove', event)" class="flex flex-col items-center justify-center py-2 sm:py-4 px-1 rounded-xl sm:rounded-2xl bg-white border border-blue-100 hover:bg-blue-50 active:bg-blue-100 active:scale-95 transition-all shadow-sm group">
                <i data-lucide="check" class="w-5 h-5 text-blue-500 mb-1 block sm:hidden"></i>
                <span class="text-sm sm:text-lg font-bold text-blue-600 group-hover:scale-105 transition-transform">Remove</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Info 說明彈窗 -->
  <div id="info-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center z-[100] p-4" onclick="toggleInfo(false)">
    <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-md w-full shadow-2xl relative animate-fade-in max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <button onclick="toggleInfo(false)" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 p-2 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
      <h3 class="text-xl sm:text-2xl font-bold mb-5 text-slate-800 flex items-center gap-3"><div class="p-2 bg-blue-100 rounded-lg"><i data-lucide="info" class="text-blue-600 w-5 h-5"></i></div>操作說明</h3>
      <div class="space-y-4 text-slate-600">
        <div class="bg-slate-50 p-4 sm:p-5 rounded-2xl border border-slate-100 hidden sm:block">
          <div class="font-bold text-slate-800 mb-3 border-b border-slate-200 pb-2">電腦鍵盤操作</div>
          <div class="flex items-start gap-3 mb-2"><kbd class="bg-white border shadow-sm px-2.5 py-1 rounded-md text-sm font-mono text-slate-700 font-bold">Space</kbd><span>翻轉卡片 / 播放語音</span></div>
          <div class="flex items-start gap-3 mb-2"><kbd class="bg-white border shadow-sm px-2.5 py-1 rounded-md text-sm font-mono text-red-600 border-red-200 font-bold mt-0.5">←</kbd><span>Review (稍後重複)</span></div>
          <div class="flex items-start gap-3 mb-2"><kbd class="bg-white border shadow-sm px-2.5 py-1 rounded-md text-sm font-mono text-green-600 border-green-200 font-bold mt-0.5">↓</kbd><span>Hold (移至末端)</span></div>
          <div class="flex items-start gap-3"><kbd class="bg-white border shadow-sm px-2.5 py-1 rounded-md text-sm font-mono text-blue-600 border-blue-200 font-bold mt-0.5">→</kbd><span>Remove (完成移除)</span></div>
        </div>
        <div class="bg-slate-50 p-4 sm:p-5 rounded-2xl border border-slate-100">
          <div class="font-bold text-slate-800 mb-3 border-b border-slate-200 pb-2 flex items-center gap-2">
            <i data-lucide="smartphone" class="w-4 h-4 text-slate-500"></i> 手機滑動操作 (看解答時)
          </div>
          <div class="flex items-center gap-3 mb-3"><div class="bg-red-50 text-red-600 border border-red-200 shadow-sm px-3 py-1 rounded-lg text-sm font-bold flex items-center gap-1"><i data-lucide="arrow-left" class="w-3 h-3"></i> 左滑</div><span class="text-sm">Review (稍後重複)</span></div>
          <div class="flex items-center gap-3 mb-3"><div class="bg-green-50 text-green-600 border border-green-200 shadow-sm px-3 py-1 rounded-lg text-sm font-bold flex items-center gap-1"><i data-lucide="arrow-down" class="w-3 h-3"></i> 下滑</div><span class="text-sm">Hold (移至末端)</span></div>
          <div class="flex items-center gap-3"><div class="bg-blue-50 text-blue-600 border border-blue-200 shadow-sm px-3 py-1 rounded-lg text-sm font-bold flex items-center gap-1">右滑 <i data-lucide="arrow-right" class="w-3 h-3"></i></div><span class="text-sm">Remove (完成移除)</span></div>
          <div class="mt-4 text-xs text-slate-500 flex items-start gap-1"><i data-lucide="lightbulb" class="w-3 h-3 mt-0.5 shrink-0"></i> 提示：你也可以使用 Safari 或 Chrome 瀏覽器的「加入主畫面」功能，把它當作真正的 App 使用！</div>
        </div>
      </div>
      <button onclick="toggleInfo(false)" class="mt-6 sm:mt-8 w-full py-3.5 bg-blue-600 text-white rounded-xl font-bold text-lg hover:bg-blue-700 transition-colors shadow-lg active:scale-95">我知道了</button>
    </div>
  </div>

  <script>
    // --- 集中狀態與工具 ---
    const CSV_URL = 'https://raw.githubusercontent.com/kotoko1012-hk/English-Vocabulary/refs/heads/main/flashcards.csv';
    const state = { cards: [], queue: [], isFlipped: false, showInfo: false, hasStarted: false, lastWord: '', lastFlipped: null };
    const $ = id => document.getElementById(id);

    // --- 初始化 ---
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
      fetchCSVData();
      window.addEventListener('keydown', handleKeyDown);
      initSwipeGestures();
    });

    // --- 手機滑動 (Swipe) 邏輯 ---
    function initSwipeGestures() {
      let startX = 0, startY = 0;
      const flashcard = $('flashcard-container');
      
      flashcard.addEventListener('touchstart', e => {
        const touch = e.changedTouches[0];
        startX = touch.screenX; startY = touch.screenY;
      }, { passive: true });

      flashcard.addEventListener('touchend', e => {
        if (!state.isFlipped) return; 
        const { screenX, screenY } = e.changedTouches[0];
        const diffX = screenX - startX, diffY = screenY - startY;
        
        if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 60) {
          handleRating(diffX > 0 ? 'remove' : 'review');
        } else if (diffY > 100 && Math.abs(diffX) < 50) {
          if (!(e.target.closest('#back-details')?.scrollTop > 0)) handleRating('hold'); 
        }
      }, { passive: true });
    }

    // --- UI 切換邏輯 ---
    function setView(activeId) {
      ['view-home', 'view-loading', 'view-finished', 'view-active'].forEach(id => {
        const el = $(id);
        el.classList.toggle('hidden', id !== activeId);
        el.classList.toggle('flex', id === activeId);
      });
      
      const isAppView = activeId === 'view-active' || activeId === 'view-finished';
      $('top-bar').classList.toggle('hidden', !isAppView);
      $('top-bar').classList.toggle('flex', isAppView);

      const isBlueBg = activeId === 'view-home' || activeId === 'view-finished';
      document.body.classList.toggle('bg-sky-100', isBlueBg);
      document.body.classList.toggle('bg-[#efe6d5]', !isBlueBg);
    }

    function updateUI() {
      if (!state.hasStarted) return state.cards.length && setView('view-home');
      if (!state.queue.length) return setView('view-finished');
      
      setView('view-active');
      const { cards, queue, isFlipped } = state;
      const total = cards.length, curr = queue.length, curCard = queue[0];
      
      $('progress-current').innerText = total - curr + 1;
      $('progress-total').innerText = total;
      $('progress-bar').style.width = `${((total - curr) / total) * 100}%`;
      
      $('front-word').innerText = $('back-word').innerText = curCard.word;
      $('back-details').innerHTML = generateBackDetailsHTML(curCard.details);
      
      $('flashcard-inner').classList.toggle('rotate-y-180', isFlipped);
      $('flashcard-container').classList.toggle('cursor-pointer', !isFlipped);
      $('card-front').style.pointerEvents = isFlipped ? 'none' : 'auto';
      $('card-back').style.pointerEvents = isFlipped ? 'auto' : 'none';
      
      if (isFlipped) $('back-details').scrollTop = 0;

      lucide.createIcons();
      checkAutoSpeak(curCard, isFlipped);
    }

    // --- HTML 生成邏輯 ---
    function generateBackDetailsHTML(details) {
      let inEx = false;
      return details.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
        const isHeader = line.startsWith('【');
        if (isHeader) inEx = line.includes('【例句】');
        
        const cssClass = isHeader 
          ? 'font-bold text-indigo-700 mt-4 text-sm sm:text-base border-b border-slate-100 pb-1 mb-2 inline-block w-full' 
          : 'text-slate-700 text-sm sm:text-base leading-relaxed pl-1';
          
        const btnHtml = (inEx && !isHeader) 
          ? `<button onclick="event.stopPropagation(); speak('${line.split(/[(（]/)[0].trim().replace(/'/g, "\\'")}')" class="ml-2 p-1.5 text-blue-500 bg-blue-50 hover:bg-blue-100 active:scale-95 rounded-full transition-colors shrink-0"><i data-lucide="volume-2" class="w-4 h-4"></i></button>` 
          : '';
          
        return `<div class="${isHeader ? '' : 'mb-2'} flex items-start w-full"><span class="flex-1 whitespace-pre-wrap ${cssClass}">${line}</span>${btnHtml}</div>`;
      }).join('');
    }

    // --- 語音邏輯 ---
    function speak(text, rate = 1.0) {
      if (!text || !window.speechSynthesis) return;
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US'; utterance.rate = rate;
      speechSynthesis.speak(utterance);
    }

    const speakWord = (rate = 1.0) => state.queue.length && speak(state.queue[0].word, rate);
    
    function checkAutoSpeak(curCard, isFlipped) {
      const targetText = isFlipped ? curCard.firstExampleEn : curCard.word;
      if (state.lastWord !== curCard.word || state.lastFlipped !== isFlipped) {
        speak(targetText);
        state.lastWord = curCard.word;
        state.lastFlipped = isFlipped;
      }
    }

    // --- 資料載入邏輯 ---
    function setLoadingState(text, icon, isError = false) {
      $('loading-text').innerText = text;
      $('loading-icon').className = `w-12 h-12 sm:w-16 sm:h-16 mb-6 ${isError ? 'text-red-500' : 'text-blue-500 animate-spin'}`;
      $('loading-icon').setAttribute('data-lucide', icon);
      lucide.createIcons();
    }

    async function fetchCSVData() {
      try {
        setLoadingState("載入單字庫中...", "loader-2");
        setView('view-loading');

        const res = await fetch(CSV_URL, { cache: "no-store" });
        if (!res.ok) throw new Error();
        
        const parsedCards = parseCSV(await res.text());
        if (!parsedCards.length) throw new Error("無資料");

        state.cards = parsedCards.sort(() => 0.5 - Math.random()).slice(0, 20);
        state.queue = [...state.cards];
        state.isFlipped = state.hasStarted = false;
        state.lastWord = ''; state.lastFlipped = null;
        setTimeout(updateUI, 300);
      } catch (e) {
        setLoadingState("載入失敗，請檢查網路連線。", "alert-circle", true);
      }
    }

    function parseCSV(text) {
      const rows = [];
      let row = [], cell = '', inQ = false;
      for (const c of text) {
        if (c === '"') {
          if (inQ && cell.endsWith('"')) cell += '"'; else inQ = !inQ;
        } else if (c === ',' && !inQ) { row.push(cell); cell = ''; } 
        else if (c === '\n' && !inQ) { row.push(cell); rows.push(row); row = []; cell = ''; } 
        else if (c !== '\r' || inQ) cell += c;
      }
      if (cell || row.length) rows.push([...row, cell]);

      return rows.filter(r => r.length >= 2).map(([word, details = ""]) => {
        word = word.trim();
        const lines = details.split('\n').map(l => l.trim()).filter(Boolean);
        const exIdx = lines.findIndex(l => l.includes('【例句】'));
        const firstExampleEn = (exIdx !== -1 && lines[exIdx + 1] && !lines[exIdx + 1].startsWith('【')) 
          ? lines[exIdx + 1].split(/[(（]/)[0].trim() : "";
        return { word, details, firstExampleEn };
      });
    }

    // --- 互動事件處理 ---
    const startLearning = () => { state.hasStarted = true; updateUI(); };
    const handleCardClick = () => { if (!state.isFlipped && state.queue.length) { state.isFlipped = true; updateUI(); } };
    
    function toggleInfo(show) {
      state.showInfo = show;
      $('info-modal').classList.toggle('hidden', !show);
      $('info-modal').classList.toggle('flex', show);
    }

    function handleRating(rating, e) {
      if (e) e.stopPropagation();
      if (!state.queue.length) return;
      
      const cur = state.queue.shift(); 
      if (rating === 'review') state.queue.splice(state.queue.length ? 1 : 0, 0, cur);
      else if (rating === 'hold') state.queue.push(cur);
      
      state.isFlipped = false;
      updateUI();
    }

    function handleKeyDown(e) {
      if (state.showInfo) return e.key === 'Escape' && toggleInfo(false);
      if (!state.cards.length) return; 
      if (!state.hasStarted) return e.code === 'Space' && (e.preventDefault(), startLearning());
      if (!state.queue.length) return;
      
      if (e.code === 'Space') {
        e.preventDefault(); 
        if (!state.isFlipped) { state.isFlipped = true; updateUI(); }
        else speakWord(0.5);
      } else if (state.isFlipped) {
        const map = { 'ArrowLeft': 'review', 'ArrowDown': 'hold', 'ArrowRight': 'remove' };
        if (map[e.key]) handleRating(map[e.key]);
      }
    }
  </script>
</body>
</html>
